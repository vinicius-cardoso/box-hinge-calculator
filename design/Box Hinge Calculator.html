<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Box Hinge Calculator — Blueprint</title>

  <!-- Design System "Blueprint": tokens, fonte ISOCPEUR, estilos dos componentes -->
  <link rel="stylesheet" href="styles.css" />

  <!-- importmap para Three.js (módulos ESM) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { overflow: hidden; }
    * { box-sizing: border-box; }

    .bhc-root { display: flex; flex-direction: column; height: 100vh; }

    .bhc-header {
      display: flex; align-items: stretch; gap: 14px; flex-wrap: wrap;
      padding: 14px 16px; border-bottom: 1px solid var(--ds-line);
      background: var(--ds-paper);
    }
    .bhc-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .bhc-main { flex: 1; display: flex; gap: 12px; padding: 12px; min-height: 0; }

    .bhc-viewport {
      flex: 1; min-width: 0; min-height: 0; position: relative;
      border: 1px solid var(--ds-line); background: rgba(18,26,30,0.35);
    }
    .bhc-panel {
      width: 352px; flex-shrink: 0; overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column; gap: 12px; padding-right: 4px;
    }

    /* scrollbar técnica */
    .bhc-panel::-webkit-scrollbar { width: 9px; }
    .bhc-panel::-webkit-scrollbar-track { background: var(--ds-paper); }
    .bhc-panel::-webkit-scrollbar-thumb { background: var(--ds-line-2); border: 2px solid var(--ds-paper); }
    .bhc-panel::-webkit-scrollbar-thumb:hover { background: var(--ds-green-dim); }

    input[type="range"] { accent-color: #5ebe83; }

    @media (max-width: 920px) {
      .bhc-root { height: auto; min-height: 100vh; }
      body { overflow: auto; }
      .bhc-main { flex-direction: column; }
      .bhc-viewport { min-height: 64vh; }
      .bhc-panel { width: 100%; }
    }
  </style>

  <!-- React + ReactDOM (UMD, globais) — exigidos pelo bundle do DS -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Bundle do Design System (window.BlueprintDS) — após o React -->
  <script src="_ds_bundle.js"></script>

  <!-- Backend na mesma máquina que serve este HTML, porta 8000 (funciona via
       localhost, IP da LAN ou Tailscale — sem hardcode). -->
  <script>window.BHC_BACKEND = location.protocol + "//" + location.hostname + ":8000";</script>

  <!-- Motor 3D (Three.js ESM) — define window.HingeEngine -->
  <script type="module" src="engine.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Camada React (Babel). Ordem importa: utilitários → componentes → App. -->
  <script type="text/babel" src="ui-components.jsx"></script>
  <script type="text/babel" src="Viewport.jsx"></script>
  <script type="text/babel" src="ControlsPanel.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
